<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Planning Calendar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-title">Planning Calendar</span>
  <div class="view-controls">
    <div class="view-tabs">
      <button class="view-tab active" data-mode="week" onclick="setViewMode('week')">Week</button>
      <button class="view-tab" data-mode="month" onclick="setViewMode('month')">Month</button>
      <button class="view-tab" data-mode="year" onclick="setViewMode('year')">Year</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="col-toggle-wrap">
      <button class="col-toggle-btn" onclick="toggleColMenu(event)" title="Ẩn/hiện cột">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <div class="col-menu" id="colMenu"></div>
    </div>
<div class="year-wrap">
      <button class="btn btn-sm btn-secondary" onclick="toggleYearMenu(event)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="yearLabel">2026</span>
        <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="year-menu" id="yearMenu"></div>
    </div>
    <div class="export-wrap">
      <button class="btn btn-sm btn-secondary" onclick="toggleExportMenu(event)">
        Export
        <svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 2.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="export-menu" id="exportMenu">
        <div class="export-opt" onclick="exportExcel()">Excel (.xlsx)</div>
        <div class="export-opt" onclick="exportData()">JSON (.json)</div>
      </div>
    </div>
    <label class="btn btn-sm btn-secondary" style="cursor:pointer">
      Import
      <input type="file" accept=".xlsx,.xls,.json" style="display:none" onchange="importData(event)">
    </label>
  </div>
</div>

<!-- PAGE -->
<div class="page">

  <div class="card">
    <div class="cal-body">
      <!-- LEFT PANEL -->
      <div class="left-panel" id="leftPanel">
        <div class="left-header">
          <div class="lh-cols">
            <div class="lc lc-sel">
              <input type="checkbox" class="sel-cb-all" onclick="toggleSelectAll()" title="Chọn tất cả">
            </div>
            <div class="lc lc-name">Name</div>
            <div class="lc lc-desc">Description</div>
            <div class="lc lc-note">Note</div>
            <div class="lc lc-pic">Main PIC</div>
            <div class="lc lc-status">Status</div>
            <div class="lc lc-from">Start Date</div>
            <div class="lc lc-to">End Date</div>
          </div>
        </div>
        <div class="left-body" id="leftBody"></div>
      </div>

      <!-- PANEL RESIZER -->
      <div class="panel-resizer" id="panelResizer">
        <div class="resizer-toggle" title="Thu gọn / Mở rộng">
          <svg width="8" height="8" viewBox="0 0 8 8">
            <path d="M5 1L2 4L5 7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- TIMELINE -->
      <div class="tl-scroll" id="tlScroll">
        <div id="tlInner"></div>
      </div>

      <!-- TIMELINE RESIZER -->
      <div class="tl-resizer" id="tlResizer" title="Kéo để thu/phóng cột calendar">
        <div class="tl-resizer-grip">⋮⋮</div>
      </div>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div id="drag-tip"></div>
<div id="reorder-ghost"></div>
<div id="reorder-indicator"></div>

<div id="bulk-bar" class="bulk-bar">
  <span class="bulk-count">0 công việc đã chọn</span>
  <button class="btn btn-sm btn-bulk-del" onclick="bulkDelete()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
      <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
    </svg>
    Xóa
  </button>
  <button class="btn btn-sm btn-secondary" onclick="deselectAll()">Bỏ chọn</button>
</div>

<!-- PIC CONFIG PANEL -->
<button class="pic-toggle" onclick="togglePicPanel()" title="Quản lý PIC">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
  </svg>
</button>
<div id="picPanel" class="pic-panel">
  <div class="pic-panel-header">
    <span>Quản lý PIC</span>
    <button class="pic-panel-close" onclick="togglePicPanel()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="pic-panel-body" id="picPanelBody"></div>
  <div class="pic-panel-footer">
    <input class="pic-new-name" id="picNewName" placeholder="Tên PIC..."
      onkeydown="if(event.key==='Enter'){addPic();event.stopPropagation();}">
    <input class="pic-new-color" id="picNewColor" type="color" value="#33B96A">
    <button class="pic-add-btn" onclick="addPic()">Thêm</button>
  </div>
</div>

<!-- JS — thứ tự load quan trọng (dependencies flow) -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/calendar.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/inline-edit.js"></script>
<script src="js/select.js"></script>
<script src="js/pic-config.js"></script>
<script src="js/tooltip.js"></script>
<script src="js/drag.js"></script>
<script src="js/io.js"></script>
<script src="js/panel.js"></script>
<script src="js/reorder.js"></script>
<script src="js/events.js"></script>
<script src="js/app.js"></script>
</body>
</html>
